@if (collection()?.length) {
  <div class="header">
    <div class="back" (click)="back()">
      🔙
    </div>

    <div class="statistic">
      <div
        class="has"
        [ngClass]="{
          'has__active': filterState().has,
          'has__inactive': hasAmount() <= 0
        }"
        (click)="hasFilter()"
      >
        ✅: {{ hasAmount() }}
      </div>
      <div
        class="absent"
        [ngClass]="{
          'absent__active': filterState().absent,
          'absent__inactive': absentAmount() <= 0
        }"
        (click)="absentFilter()">
        ❌: {{ absentAmount() }}
      </div>
    </div>
  </div>

  <div class="list">
    @for (item of list(); track $index) {
      <stk-item-card [key]="key()" [item]="item" (itemChange)="change($event)"></stk-item-card>
    }
  </div>
}
